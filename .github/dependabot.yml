version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      groups:
          tooling:
              patterns:
                  - '@types/*'
                  - '@typescript-eslint/*'
                  - eslint*
                  - prettier*
                  - ts-*
                  - typescript
                  - webpack*
          runtime:
              patterns:
                  - '@xmldom/*'
                  - fflate
      open-pull-requests-limit: 10
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
