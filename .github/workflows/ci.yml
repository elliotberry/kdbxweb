name: CI

on:
    pull_request:
    push:
        branches:
            - master

jobs:
    quality:
        name: Quality (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [18, 20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run typecheck
            - run: npm run tests:node

    coverage:
        name: Coverage Gate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run tests:cover

    package-checks:
        name: Package Outputs
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run build:modules
            - run: npm run pack:dist-debug
            - run: npm run pack:dist-prod
            - run: npm run pack:tests
            - run: npm run verify:artifacts
            - run: npm run verify:bundle-size
            - run: npm run verify:types
            - run: npm run compat:node
            - run: npm run compare:bundlers
            - uses: actions/upload-artifact@v4
              with:
                  name: bundler-comparison
                  path: dist/bundler-comparison.json
