name: Release Validate

on:
    release:
        types: [published]
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run typecheck
            - run: npm run tests:cover
            - run: npm run build:modules
            - run: npm run pack:dist-debug
            - run: npm run pack:dist-prod
            - run: npm run verify:artifacts
            - run: npm run verify:bundle-size
            - run: npm run verify:types
            - run: npm run sbom
            - uses: actions/upload-artifact@v4
              with:
                  name: sbom
                  path: dist/sbom.json
